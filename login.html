<!DOCTYPE html>
<html>
<head>
  <title>Login - Car System</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(120deg, #141e30, #243b55);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h2 {
      text-align: center;
      color: #243b55;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #243b55;
      color: white;
      border: none;
      border-radius: 8px;
    }

    button:hover {
      background: #141e30;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Ingia</button>

  <p style="text-align:center;">
    Huna account? <a href="register.html">Register</a>
  </p>
</div>

<script>
function login() {
  let user = JSON.parse(localStorage.getItem(email.value));

  if (user && user.password === password.value) {
    localStorage.setItem("loggedInUser", user.email);
    window.location.href = "dashboard.html";
  } else {
    alert("Login imekataa!");
  }
}
</script>

</body>
</html>
